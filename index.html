<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes">
    <title>每日打卡 · 光阴习惯</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(145deg, #f4fafd 0%, #e0edf5 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 12px;
            touch-action: pan-y; /* 优化触摸滚动 */
        }

        .card {
            max-width: 750px;
            width: 100%;
            background: rgba(255,255,255,0.75);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-radius: 48px 48px 40px 40px;
            box-shadow: 0 25px 50px -10px rgba(0, 35, 60, 0.3);
            border: 1px solid rgba(255,255,255,0.6);
            padding: 28px 20px 30px;
            transition: all 0.2s;
        }

        /* 标题区 */
        .title-section {
            text-align: center;
            margin-bottom: 22px;
        }
        .main-title {
            font-size: 2.1rem;
            font-weight: 700;
            letter-spacing: 1px;
            color: #10567e;
            text-shadow: 2px 2px 0 rgba(255,255,255,0.7);
            line-height: 1.2;
        }
        .sub-title {
            font-size: 1rem;
            font-weight: 400;
            color: #3f738f;
            margin-top: 4px;
            opacity: 0.9;
        }

        /* 日历头部 */
        .calendar-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 18px;
            flex-wrap: wrap;
            gap: 12px;
        }

        .month-nav {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(230, 242, 255, 0.7);
            padding: 4px 8px;
            border-radius: 40px;
            backdrop-filter: blur(4px);
        }

        .month-nav button {
            background: white;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 40px;
            font-size: 24px;
            font-weight: 300;
            color: #1f608b;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 10px rgba(0,40,70,0.1);
            transition: 0.15s;
            border: 1px solid rgba(60, 140, 210, 0.2);
        }

        .month-nav button:hover {
            background: #cde3f5;
            transform: scale(1.02);
        }
        .month-nav button:active { transform: scale(0.97); }

        #monthYear {
            font-weight: 600;
            font-size: 1.4rem;
            color: #043753;
            min-width: 160px;
            text-align: center;
        }

        .today-btn {
            background: white;
            border: none;
            padding: 10px 24px;
            border-radius: 40px;
            font-weight: 500;
            color: #156b9c;
            cursor: pointer;
            box-shadow: 0 4px 14px rgba(22, 110, 180, 0.2);
            font-size: 1rem;
            border: 1px solid #b9d9f0;
            transition: 0.15s;
        }
        .today-btn:hover {
            background: #e5f0fa;
            color: #05416b;
        }

        /* 星期 */
        .weekdays {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            text-align: center;
            font-weight: 600;
            color: #2b6589;
            font-size: 0.9rem;
            text-transform: uppercase;
            margin-bottom: 6px;
            padding: 0 4px;
        }

        /* 日历网格 */
        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 6px;
            background: rgba(255,255,255,0.4);
            border-radius: 32px;
            padding: 16px 12px;
            backdrop-filter: blur(4px);
            margin-bottom: 20px;
            touch-action: pan-y; /* 允许垂直滚动 */
            user-select: none; /* 防止文本选择 */
        }

        /* 滑动动画 */
        .calendar-grid.swipe-left {
            animation: swipeLeft 0.3s ease-out;
        }

        .calendar-grid.swipe-right {
            animation: swipeRight 0.3s ease-out;
        }

        @keyframes swipeLeft {
            0% { transform: translateX(-20px); opacity: 0.7; }
            100% { transform: translateX(0); opacity: 1; }
        }

        @keyframes swipeRight {
            0% { transform: translateX(20px); opacity: 0.7; }
            100% { transform: translateX(0); opacity: 1; }
        }

        .calendar-cell {
            aspect-ratio: 1 / 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #ffffffdd;
            border-radius: 28%;
            box-shadow: 0 2px 6px rgba(0,0,0,0.02);
            cursor: pointer;
            border: 2px solid transparent;
            transition: all 0.1s ease;
            font-size: 1.3rem;
            font-weight: 500;
            color: #154b6e;
        }

        /* 打过卡绿底 */
        .calendar-cell.punched {
            background-color: #b6dfce;
            box-shadow: 0 4px 10px rgba(50, 120, 100, 0.2);
            color: #023f4a;
        }

        /* 未打卡白底 (默认) */
        .calendar-cell:not(.punched) {
            background-color: #f9fcff;
        }

        /* 今日: 柔和金边 */
        .calendar-cell.today {
            border: 2px solid #fdb44b;
            box-shadow: 0 0 0 3px rgba(253, 180, 75, 0.25);
        }
        /* 选中: 海蓝外圈 */
        .calendar-cell.selected {
            border: 2px solid #1978c7;
            box-shadow: 0 0 0 3px rgba(25, 120, 199, 0.3);
            transform: scale(1.01);
        }

        .calendar-cell:hover {
            background-color: #d9ecff;
            transform: scale(1.02);
            z-index: 2;
        }

        /* 非当前月淡化 */
        .calendar-cell.other-month {
            opacity: 0.5;
        }

        /* 计数面板 */
        .counter-panel {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            border-radius: 70px;
            padding: 18px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 8px 20px -6px rgba(0,70,110,0.2);
            border: 1px solid white;
            margin: 16px 0 20px;
            flex-wrap: wrap;
            gap: 14px;
        }

        .date-badge {
            background: #d4e7f7;
            padding: 8px 22px;
            border-radius: 50px;
            color: #09466e;
            font-weight: 600;
            font-size: 1.2rem;
            box-shadow: inset 0 1px 4px #b5cfe3;
        }

        .counter-controls {
            display: flex;
            align-items: center;
            gap: 18px;
        }

        .counter-btn {
            width: 54px;
            height: 54px;
            border-radius: 54px;
            background: white;
            border: none;
            font-size: 32px;
            font-weight: 300;
            color: #105f8a;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 8px 18px rgba(30, 95, 150, 0.2);
            transition: 0.12s;
            border: 1px solid rgba(70, 150, 220, 0.3);
        }
        .counter-btn:hover {
            background: #e1f0fc;
            transform: scale(1.04);
        }
        .counter-btn:active { transform: scale(0.96); }

        #countDisplay {
            font-size: 3.2rem;
            font-weight: 600;
            color: #0b3a56;
            min-width: 80px;
            text-align: center;
            text-shadow: 1px 1px 0 white;
        }

        /* 统计卡片区域 (四个) */
        .stats-row {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            margin-top: 18px;
        }

        .stat-item {
            background: rgba(255,255,255,0.65);
            backdrop-filter: blur(8px);
            border-radius: 28px;
            padding: 16px 6px;
            text-align: center;
            box-shadow: 0 6px 14px rgba(0, 40, 70, 0.1);
            border: 1px solid rgba(255,255,255,0.7);
            transition: transform 0.1s;
        }

        .stat-number {
            font-size: 2.2rem;
            font-weight: 700;
            line-height: 1.1;
            color: #0a3e5c;
        }

        .stat-label {
            font-size: 0.8rem;
            color: #2b607c;
            letter-spacing: 0.3px;
            font-weight: 500;
            white-space: nowrap;
        }

        /* 连续打卡数字颜色：绿色 */
        .stat-item.highlight-streak .stat-number {
            color: #1f8a5c;
        }

        /* 连续未打卡数字颜色：橙红 */
        .stat-item.highlight-broken .stat-number {
            color: #c94f2b;
        }

        /* 滑动提示 */
        .swipe-hint {
            display: none;
            text-align: center;
            font-size: 0.8rem;
            color: #3f738f;
            margin-top: 8px;
            opacity: 0.7;
        }

        .swipe-hint .hint-icon {
            display: inline-block;
            margin: 0 4px;
            font-size: 1.2rem;
        }

        /* 小屏适配 */
        @media (max-width: 550px) {
            .card { padding: 20px 12px; border-radius: 36px; }
            .main-title { font-size: 1.8rem; }
            .sub-title { font-size: 0.9rem; }
            .month-nav button { width: 36px; height: 36px; font-size: 20px; }
            #monthYear { font-size: 1.2rem; min-width: 120px; }
            .today-btn { padding: 8px 16px; font-size: 0.9rem; }
            .calendar-grid { gap: 4px; padding: 10px 6px; }
            .calendar-cell { font-size: 1.2rem; }
            .counter-panel { border-radius: 40px; padding: 14px 16px; }
            .date-badge { padding: 6px 16px; font-size: 1rem; }
            .counter-btn { width: 46px; height: 46px; font-size: 28px; }
            #countDisplay { font-size: 2.6rem; min-width: 60px; }
            .stats-row { gap: 6px; }
            .stat-number { font-size: 1.6rem; }
            .stat-label { font-size: 0.7rem; }
            .swipe-hint { display: block; }
        }

        @media (max-width: 380px) {
            .stats-row { grid-template-columns: repeat(2, 1fr); } /* 太小就两列 */
        }
    </style>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
</head>
<body>
<div class="card">
    <!-- 标题区 -->
    <div class="title-section">
        <div class="main-title">📆 每日打卡统计</div>
        <div class="sub-title">记录每日打卡，培养良好习惯</div>
    </div>

    <!-- 日历头部 -->
    <div class="calendar-header">
        <div class="month-nav">
            <button id="prevMonthBtn" title="上个月">←</button>
            <span id="monthYear">2025年3月</span>
            <button id="nextMonthBtn" title="下个月">→</button>
        </div>
        <button class="today-btn" id="todayBtn">🔖 今日</button>
    </div>

    <!-- 星期 -->
    <div class="weekdays">
        <span>日</span><span>一</span><span>二</span><span>三</span><span>四</span><span>五</span><span>六</span>
    </div>

    <!-- 日历网格 -->
    <div class="calendar-grid" id="calendarGrid"></div>
    
    <!-- 移动端滑动提示 -->
    <div class="swipe-hint" id="swipeHint">
        <span class="hint-icon">←</span> 左右滑动切换月份 <span class="hint-icon">→</span>
    </div>

    <!-- 下方计数区域 -->
    <div class="counter-panel">
        <div class="date-badge" id="selectedDateLabel">2025-03-11</div>
        <div class="counter-controls">
            <button class="counter-btn" id="decrementBtn" title="减少打卡次数">−</button>
            <span id="countDisplay">0</span>
            <button class="counter-btn" id="incrementBtn" title="增加打卡次数">+</button>
        </div>
    </div>

    <!-- 统计卡片 (四个) -->
    <div class="stats-row" id="statsRow">
        <div class="stat-item">
            <div class="stat-number" id="monthTotal">0</div>
            <div class="stat-label">本月打卡</div>
        </div>
        <div class="stat-item">
            <div class="stat-number" id="totalPunches">0</div>
            <div class="stat-label">累计打卡</div>
        </div>
        <div class="stat-item highlight-streak" id="streakItem">
            <div class="stat-number" id="streakDays">0</div>
            <div class="stat-label">连续打卡</div>
        </div>
        <div class="stat-item highlight-broken" id="brokenItem">
            <div class="stat-number" id="brokenDays">0</div>
            <div class="stat-label">本月连续未打卡</div>
        </div>
    </div>
</div>

<script>
    (function() {
        // ---------- 数据存储 ----------
        const STORAGE_KEY = 'daily_punch_counts_v2';

        function loadCounts() {
            const stored = localStorage.getItem(STORAGE_KEY);
            if (stored) {
                try {
                    return JSON.parse(stored) || {};
                } catch { return {}; }
            }
            return {};
        }

        function saveCounts(counts) {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(counts));
        }

        function getCountForDate(dateStr) {
            return loadCounts()[dateStr] || 0;
        }

        function setCountForDate(dateStr, newCount) {
            if (newCount < 0) newCount = 0;
            const counts = loadCounts();
            if (newCount === 0) {
                if (counts.hasOwnProperty(dateStr)) delete counts[dateStr];
            } else {
                counts[dateStr] = newCount;
            }
            saveCounts(counts);
        }

        // ---------- 全局变量 ----------
        let currentYear = new Date().getFullYear();
        let currentMonth = new Date().getMonth();
        let selectedDateStr = (() => {
            const d = new Date();
            return formatDate(d);
        })();
        let lastCheckDateStr = formatDate(new Date());
        
        // 滑动相关变量
        let touchStartX = 0;
        let touchStartY = 0;
        let touchEndX = 0;
        let touchEndY = 0;
        const SWIPE_THRESHOLD = 50; // 滑动阈值（像素）
        const VERTICAL_THRESHOLD = 30; // 垂直滑动阈值，避免误触

        // DOM
        const monthYearSpan = document.getElementById('monthYear');
        const calendarGrid = document.getElementById('calendarGrid');
        const selectedDateLabel = document.getElementById('selectedDateLabel');
        const countDisplay = document.getElementById('countDisplay');
        const decrementBtn = document.getElementById('decrementBtn');
        const incrementBtn = document.getElementById('incrementBtn');
        const prevMonthBtn = document.getElementById('prevMonthBtn');
        const nextMonthBtn = document.getElementById('nextMonthBtn');
        const todayBtn = document.getElementById('todayBtn');
        // 统计数字元素
        const monthTotalSpan = document.getElementById('monthTotal');
        const totalPunchesSpan = document.getElementById('totalPunches');
        const streakDaysSpan = document.getElementById('streakDays');
        const brokenDaysSpan = document.getElementById('brokenDays');

        // ---------- 工具 ----------
        function formatDate(date) {
            const y = date.getFullYear();
            const m = String(date.getMonth() + 1).padStart(2, '0');
            const d = String(date.getDate()).padStart(2, '0');
            return `${y}-${m}-${d}`;
        }

        // ---------- 统计计算 ----------
        function computeStats() {
            const counts = loadCounts();
            // 本月打卡次数: 当前年份、月份 (currentYear, currentMonth)
            let monthTotal = 0;
            // 累计打卡次数: 所有打卡次数总和
            let totalPunches = 0;

            for (let dateStr in counts) {
                if (counts.hasOwnProperty(dateStr)) {
                    const val = counts[dateStr];
                    totalPunches += val;
                    // 判断是否当前月
                    if (dateStr.startsWith(`${currentYear}-${String(currentMonth+1).padStart(2,'0')}`)) {
                        monthTotal += val;
                    }
                }
            }

            // 连续打卡天数: 从今天(本地日期)往前推, 直到遇到打卡次数为0或没有记录
            const today = new Date();
            const todayStr = formatDate(today);
            let streak = 0;
            let checkDate = new Date(today);
            while (true) {
                const dStr = formatDate(checkDate);
                if (getCountForDate(dStr) > 0) {
                    streak++;
                    checkDate.setDate(checkDate.getDate() - 1);
                } else {
                    break;
                }
            }

            // 本月连续未打卡天数: 从今天开始往过去推(仅限于本月)，直到遇到打卡次数>0 或 到达本月第一天
            let broken = 0;
            let brokenDate = new Date(today);
            // 如果今天打卡了，则连续未打卡为0？我们直接从今天开始往前，遇到打卡>0停止。
            while (true) {
                const dStr = formatDate(brokenDate);
                // 必须在本月内
                if (brokenDate.getFullYear() === currentYear && brokenDate.getMonth() === currentMonth) {
                    if (getCountForDate(dStr) === 0) {
                        broken++;
                        brokenDate.setDate(brokenDate.getDate() - 1);
                    } else {
                        break;
                    }
                } else {
                    break; // 超出本月
                }
            }

            return { monthTotal, totalPunches, streak, broken };
        }

        function updateStats() {
            const { monthTotal, totalPunches, streak, broken } = computeStats();
            monthTotalSpan.textContent = monthTotal;
            totalPunchesSpan.textContent = totalPunches;
            streakDaysSpan.textContent = streak;
            brokenDaysSpan.textContent = broken;
        }

        // 更新计数显示
        function updateCountDisplay() {
            const count = getCountForDate(selectedDateStr);
            countDisplay.textContent = count;
            selectedDateLabel.textContent = selectedDateStr;
            updateStats(); // 每次修改计数后重新统计
        }

        // 渲染日历 (无农历)
        function renderCalendar() {
            monthYearSpan.textContent = `${currentYear}年${String(currentMonth + 1).padStart(2, '0')}月`;

            const firstDay = new Date(currentYear, currentMonth, 1);
            const startWeekday = firstDay.getDay();
            const lastDate = new Date(currentYear, currentMonth + 1, 0).getDate();
            const totalCells = 42;

            const today = new Date();
            const todayStr = formatDate(today);

            let gridHtml = '';

            for (let i = 0; i < totalCells; i++) {
                const cellDate = new Date(currentYear, currentMonth, 1);
                cellDate.setDate(1 - startWeekday + i);

                const cellYear = cellDate.getFullYear();
                const cellMonth = cellDate.getMonth();
                const cellDay = cellDate.getDate();

                const cellDateStr = formatDate(cellDate);
                const isCurrentMonth = (cellMonth === currentMonth);

                // 构建类
                let cellClasses = 'calendar-cell';
                if (!isCurrentMonth) cellClasses += ' other-month';

                const count = getCountForDate(cellDateStr);
                if (count > 0) cellClasses += ' punched';

                if (cellDateStr === todayStr) cellClasses += ' today';
                if (cellDateStr === selectedDateStr) cellClasses += ' selected';

                gridHtml += `<div class="${cellClasses}" data-full-date="${cellDateStr}">${cellDay}</div>`;
            }

            calendarGrid.innerHTML = gridHtml;
            updateCountDisplay(); // 同时更新选中日期数字及统计
        }

        // 切换月份后调整选中日期
        function adjustSelectedAfterMonthChange() {
            const [selYear, selMonth] = selectedDateStr.split('-').map(Number);
            if (selYear !== currentYear || (selMonth - 1) !== currentMonth) {
                const firstDay = new Date(currentYear, currentMonth, 1);
                selectedDateStr = formatDate(firstDay);
            }
            renderCalendar();
        }

        function goPrevMonth() {
            if (currentMonth === 0) { currentYear--; currentMonth = 11; }
            else { currentMonth--; }
            adjustSelectedAfterMonthChange();
            // 添加滑动动画
            calendarGrid.classList.add('swipe-right');
            setTimeout(() => {
                calendarGrid.classList.remove('swipe-right');
            }, 300);
        }

        function goNextMonth() {
            if (currentMonth === 11) { currentYear++; currentMonth = 0; }
            else { currentMonth++; }
            adjustSelectedAfterMonthChange();
            // 添加滑动动画
            calendarGrid.classList.add('swipe-left');
            setTimeout(() => {
                calendarGrid.classList.remove('swipe-left');
            }, 300);
        }

        function goToday() {
            const today = new Date();
            currentYear = today.getFullYear();
            currentMonth = today.getMonth();
            selectedDateStr = formatDate(today);
            renderCalendar();
        }

        // 跨日检测
        function handleDayChange(oldDateStr, newDateStr) {
            const newDateObj = new Date(newDateStr + 'T00:00:00');
            const prevDate = new Date(newDateObj);
            prevDate.setDate(prevDate.getDate() - 1);
            const prevDateStr = formatDate(prevDate);
            const yesterdayCount = getCountForDate(prevDateStr);

            renderCalendar(); // 刷新样式 (昨天打卡次数已经存储)

            // 温和提示
            const tip = document.createElement('div');
            tip.textContent = `昨日 (${prevDateStr}) 打卡 ${yesterdayCount} 次`;
            tip.style.position = 'fixed';
            tip.style.bottom = '20px';
            tip.style.left = '50%';
            tip.style.transform = 'translateX(-50%)';
            tip.style.background = '#10577a';
            tip.style.color = 'white';
            tip.style.padding = '8px 24px';
            tip.style.borderRadius = '60px';
            tip.style.fontSize = '0.9rem';
            tip.style.zIndex = '999';
            tip.style.boxShadow = '0 10px 20px rgba(0,0,0,0.2)';
            tip.style.transition = 'opacity 0.4s';
            document.body.appendChild(tip);
            setTimeout(() => {
                tip.style.opacity = '0';
                setTimeout(() => tip.remove(), 400);
            }, 2000);
        }

        // ---------- 滑动功能 ----------
        function setupSwipeHandlers() {
            // 触摸开始
            calendarGrid.addEventListener('touchstart', function(e) {
                touchStartX = e.changedTouches[0].screenX;
                touchStartY = e.changedTouches[0].screenY;
            }, { passive: true });

            // 触摸结束
            calendarGrid.addEventListener('touchend', function(e) {
                touchEndX = e.changedTouches[0].screenX;
                touchEndY = e.changedTouches[0].screenY;
                
                // 计算滑动距离
                const diffX = touchStartX - touchEndX;
                const diffY = touchStartY - touchEndY;
                
                // 检查是否是水平滑动（垂直滑动距离较小）
                if (Math.abs(diffY) < VERTICAL_THRESHOLD) {
                    // 向右滑动（切换到上个月）
                    if (diffX < -SWIPE_THRESHOLD) {
                        goPrevMonth();
                    }
                    // 向左滑动（切换到下个月）
                    else if (diffX > SWIPE_THRESHOLD) {
                        goNextMonth();
                    }
                }
            }, { passive: true });

            // 鼠标事件支持（用于桌面端测试）
            let mouseDownX = 0;
            let mouseDownY = 0;
            
            calendarGrid.addEventListener('mousedown', function(e) {
                mouseDownX = e.clientX;
                mouseDownY = e.clientY;
            });

            calendarGrid.addEventListener('mouseup', function(e) {
                const mouseUpX = e.clientX;
                const mouseUpY = e.clientY;
                const diffX = mouseDownX - mouseUpX;
                const diffY = mouseDownY - mouseUpY;
                
                // 检查是否是水平滑动
                if (Math.abs(diffY) < VERTICAL_THRESHOLD) {
                    if (diffX < -SWIPE_THRESHOLD) {
                        goPrevMonth();
                    } else if (diffX > SWIPE_THRESHOLD) {
                        goNextMonth();
                    }
                }
            });
        }

        function initDateCheck() {
            setInterval(() => {
                const nowDateStr = formatDate(new Date());
                if (nowDateStr !== lastCheckDateStr) {
                    handleDayChange(lastCheckDateStr, nowDateStr);
                    lastCheckDateStr = nowDateStr;
                }
            }, 1000);
        }

        function checkImmediate() {
            const nowDateStr = formatDate(new Date());
            if (nowDateStr !== lastCheckDateStr) {
                handleDayChange(lastCheckDateStr, nowDateStr);
                lastCheckDateStr = nowDateStr;
            }
        }

        // ---------- 事件绑定 ----------
        calendarGrid.addEventListener('click', (e) => {
            const cell = e.target.closest('.calendar-cell');
            if (!cell) return;
            const fullDate = cell.dataset.fullDate;
            if (fullDate) {
                selectedDateStr = fullDate;
                const [year, month] = fullDate.split('-').map(Number);
                if (year !== currentYear || (month - 1) !== currentMonth) {
                    currentYear = year;
                    currentMonth = month - 1;
                }
                renderCalendar();
            }
        });

        incrementBtn.addEventListener('click', () => {
            const currentCount = getCountForDate(selectedDateStr);
            setCountForDate(selectedDateStr, currentCount + 1);
            renderCalendar(); // 会刷新样式和统计
        });

        decrementBtn.addEventListener('click', () => {
            const currentCount = getCountForDate(selectedDateStr);
            if (currentCount > 0) {
                setCountForDate(selectedDateStr, currentCount - 1);
                renderCalendar();
            }
        });

        prevMonthBtn.addEventListener('click', goPrevMonth);
        nextMonthBtn.addEventListener('click', goNextMonth);
        todayBtn.addEventListener('click', goToday);

        // 初始化
        renderCalendar();
        setupSwipeHandlers(); // 初始化滑动功能
        checkImmediate();
        initDateCheck();
    })();
</script>
</body>
</html>
